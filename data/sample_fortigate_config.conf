config firewall policy
    edit 1
        set name "Allow-Internal-Outbound"
        set srcintf "port1"
        set dstintf "port2"
        set srcaddr "Internal_Subnet"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
    edit 2
        set name "Overly-Permissive-Test"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic disable
    next
    edit 3
        set name "Block-Malicious-IP"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "Malicious_IPs"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
end